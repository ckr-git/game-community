server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: game-community-platform-test
  
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password: 
  
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  
  h2:
    console:
      enabled: true
  
  redis:
    host: localhost
    port: 6379
    database: 1

# MyBatis-Plus配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT配置
jwt:
  secret: game-community-platform-test-secret-key-2024
  expiration: 3600

# 日志配置
logging:
  level:
    com.game.community: debug
    org.springframework: info
